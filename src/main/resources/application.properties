




# Expose port 8086 to Localhost and your coworker across the LAN
server.port=8086
server.address=0.0.0.0

# Database Connectivity Options (Oracle 10g Configuration)
spring.datasource.url=jdbc:oracle:thin:@192.168.9.34:1521:baan
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=scott
spring.datasource.password=tiger

# ⚡ HikariCP Connection Pool Configuration
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=CvpsHikariPool

# 📁 Application Log File Path Configuration
logging.file.name=logs/cvps-backend.log
logging.pattern.file=%d{yyyy-MM-DD HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG

# Hibernate SQL Rules
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 📂 Document Management Local Path Configuration
app.upload.dir=F:/CVPS/uploaded_documents/
